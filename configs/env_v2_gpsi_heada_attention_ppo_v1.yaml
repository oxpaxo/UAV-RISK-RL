version: env_v2_gpsi_heada_attention_ppo_v1
env:
  name: DynamicObstacleFlowEnv
  train_scenario: train_flow_mixed
  n_envs: 4
  device: cpu
gpsi:
  checkpoint: work_dirs/gpsi_heada_v1_nll/best.pth
  history_steps: 20
  delta_scale: 5.0
  logvar_clamp: [-5.0, 3.0]
  normalize_z: false
  obs_aug_dim: 94
ppo:
  agg: attention
  hidden_dim: 64
  net_arch:
    pi: [128, 128]
    vf: [128, 128]
  n_steps: 1024
  batch_size: 256
  n_epochs: 10
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
training:
  seed: 0
  total_steps: 1500000
  checkpoint_steps: [250000, 500000, 1000000, 1500000]
  no_shield: true
  use_safety_cost: false
  reward: EnvV2 original reward
eval:
  scenarios:
    - eval_flow_id
    - eval_flow_high_density
    - eval_flow_high_speed
    - eval_flow_high_threat
    - eval_flow_mixed_ood
    - eval_flow_sudden_threat
  episodes_per_scenario: 50
  eval_seed: 1000
  attention_reference: checkpoints/env_v2_phase2/attention_full_s0/attention_full_s0_step1500000.zip
